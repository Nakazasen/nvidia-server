<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NVIDIA NIM Agent IDE</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #76b900;
            --bg: #0b0e14;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; display: flex; }
        
        /* Layout */
        .sidebar { width: 300px; background: rgba(0,0,0,0.3); border-right: 1px solid var(--glass-border); display: flex; flex-direction: column; padding: 20px; }
        .main { flex: 1; display: flex; flex-direction: column; position: relative; }
        .plan-bar { width: 320px; background: rgba(0,0,0,0.3); border-left: 1px solid var(--glass-border); padding: 20px; }

        /* Components */
        h2 { font-size: 1.2rem; margin-bottom: 20px; color: var(--primary); display: flex; align-items: center; gap: 10px; }
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        /* Fix lỗi tràn khung cho tin nhắn */
        .message {
            max-width: 85%;
            padding: 12px 18px;
            border-radius: 15px;
            margin-bottom: 15px;
            font-size: 0.95rem;
            line-height: 1.5;
            backdrop-filter: blur(5px);
            word-break: break-word; /* Tự động xuống dòng */
            overflow-wrap: break-word;
        }

        .user-message {
            align-self: flex-end;
            background: var(--primary);
            color: #000;
            border-bottom-right-radius: 2px;
            box-shadow: 0 4px 15px rgba(118, 185, 0, 0.3);
        }
        .assistant-message { align-self: flex-start; background: var(--glass); border: 1px solid var(--glass-border); border-bottom-left-radius: 2px; }
        
        .input-area { padding: 20px; background: var(--glass); border-top: 1px solid var(--glass-border); display: flex; gap: 10px; align-items: center; }
        input[type="text"] { flex: 1; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); padding: 12px 20px; border-radius: 25px; color: #fff; outline: none; transition: 0.3s; }
        input[type="text"]:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(118, 185, 0, 0.2); }
        
        .btn-icon { background: var(--glass); border: 1px solid var(--glass-border); width: 45px; height: 45px; border-radius: 50%; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .btn-icon:hover { background: var(--primary); color: #000; transform: scale(1.1); }

        /* Plan Steps */
        .step { background: var(--glass); padding: 10px; border-radius: 8px; margin-bottom: 10px; border-left: 3px solid var(--primary); font-size: 0.85rem; opacity: 0.7; }
        .step.active { opacity: 1; background: rgba(118, 185, 0, 0.1); }

        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(5px); }
        .modal-overlay.active { display: flex; }
        .modal { background: #1a1d23; padding: 30px; border-radius: 20px; border: 1px solid var(--glass-border); width: 400px; text-align: center; }
        .modal h3 { margin-bottom: 15px; color: var(--primary); }
        .modal p { margin-bottom: 25px; font-size: 0.9rem; color: #ccc; }
        .modal-btns { display: flex; gap: 10px; justify-content: center; }
        .btn { padding: 10px 25px; border-radius: 10px; cursor: pointer; border: none; font-weight: 600; }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-secondary { background: #333; color: #fff; }

        /* Media Preview */
        #media-preview { position: absolute; bottom: 90px; left: 20px; display: flex; gap: 10px; }
        .media-item { width: 60px; height: 60px; border-radius: 8px; border: 2px solid var(--primary); object-fit: cover; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>⚙️ Cấu hình</h2>
        <label style="font-size: 0.8rem; opacity: 0.6;">Mô hình NIM:</label>
        <select id="model-select" style="width:100%; background:#000; color:#fff; border:1px solid #333; padding:8px; border-radius:5px; margin-top:5px; margin-bottom: 20px;">
            <option>⏳ Đang tải mô hình từ NVIDIA...</option>
        </select>

        <div style="margin-top: 20px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px; border: 1px solid var(--glass-border);">
            <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 0.9rem;">
                <input type="checkbox" id="auto-accept" style="width: 18px; height: 18px; accent-color: var(--primary);">
                <span>Auto-Accept (Tự động duyệt)</span>
            </label>
            <p style="font-size: 0.7rem; opacity: 0.5; margin-top: 8px;">Bật để Agent tự chạy lệnh và ghi file không cần hỏi.</p>
        </div>
    </div>

    <div class="main">
        <div class="chat-container" id="chat-box"></div>
        <div id="media-preview"></div>
        <div class="input-area">
            <input type="file" id="file-input" hidden multiple>
            <button class="btn-icon" onclick="document.getElementById('file-input').click()">➕</button>
            <input type="text" id="user-input" placeholder="Nhập yêu cầu hoặc đính kèm Media...">
            <button class="btn-icon" onclick="sendMessage()">🚀</button>
        </div>
    </div>

    <div class="plan-bar">
        <h2>📋 Kế hoạch (Plan)</h2>
        <div id="plan-steps"></div>
    </div>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <h3>🛡️ Xác nhận hành động</h3>
            <p id="modal-desc"></p>
            <div class="modal-btns">
                <button class="btn btn-secondary" id="btn-deny">Từ chối</button>
                <button class="btn btn-primary" id="btn-allow">Cho phép</button>
            </div>
        </div>
    </div>

    <!-- Mentions Suggestions -->
    <div id="mentions-box" class="mentions-box"></div>

    <style>
        .mentions-box {
            position: absolute;
            background: #1a1d23;
            border: 1px solid var(--primary);
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
            z-index: 1000;
            width: 250px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
        .mention-item {
            padding: 8px 15px;
            cursor: pointer;
            font-size: 0.85rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .mention-item:hover {
            background: var(--primary);
            color: #000;
        }
    </style>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const planSteps = document.getElementById('plan-steps');
        const mediaPreview = document.getElementById('media-preview');
        const fileInput = document.getElementById('file-input');
        const modelSelect = document.getElementById('model-select');
        const mentionsBox = document.getElementById('mentions-box');
        
        let messageHistory = [];
        let attachedMedia = [];
        let allFiles = [];

        // --- Fetch Models Dynamically ---
        async function fetchModels() {
            try {
                const res = await fetch('/api/models');
                const data = await res.json();
                if (data.data) {
                    modelSelect.innerHTML = data.data
                        .sort((a, b) => a.id.localeCompare(b.id))
                        .map(m => `<option value="${m.id}">${m.id}</option>`)
                        .join('');
                    
                    // Chọn mặc định DeepSeek nếu có
                    const ds = data.data.find(m => m.id.includes('deepseek-v4-flash'));
                    if (ds) modelSelect.value = ds.id;
                }
            } catch (e) {
                modelSelect.innerHTML = '<option>Lỗi: Không thể tải danh sách mô hình</option>';
            }
        }
        fetchModels();

        // --- Fetch Files for Mentions ---
        async function refreshFiles() {
            const res = await fetch('/api/list_dir', { method: 'POST', body: JSON.stringify({ path: '.' }) });
            const data = await res.json();
            allFiles = JSON.parse(data.result);
        }
        refreshFiles();

        // --- Mentions Logic ---
        userInput.oninput = (e) => {
            const val = e.target.value;
            const lastAt = val.lastIndexOf('@');
            
            if (lastAt !== -1 && (lastAt === 0 || val[lastAt - 1] === ' ')) {
                const query = val.substring(lastAt + 1).toLowerCase();
                const filtered = allFiles.filter(f => f.toLowerCase().includes(query));
                
                if (filtered.length > 0) {
                    mentionsBox.innerHTML = filtered.map(f => `<div class="mention-item" onclick="selectMention('${f}')">${f}</div>`).join('');
                    mentionsBox.style.display = 'block';
                    
                    // Position box
                    const rect = userInput.getBoundingClientRect();
                    mentionsBox.style.bottom = (window.innerHeight - rect.top + 5) + 'px';
                    mentionsBox.style.left = rect.left + 'px';
                } else {
                    mentionsBox.style.display = 'none';
                }
            } else {
                mentionsBox.style.display = 'none';
            }
        };

        function selectMention(filename) {
            const val = userInput.value;
            const lastAt = val.lastIndexOf('@');
            userInput.value = val.substring(0, lastAt) + '@' + filename + ' ';
            mentionsBox.style.display = 'none';
            userInput.focus();
        }

        // --- Media Handling ---
        fileInput.onchange = (e) => {
            Array.from(e.target.files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    attachedMedia.push({ type: file.type, data: ev.target.result, name: file.name });
                    const img = document.createElement('img');
                    img.src = ev.target.result;
                    img.className = 'media-item';
                    mediaPreview.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
        };

        const tools_def = [
            { type: "function", function: { name: "update_plan", description: "Cập nhật các bước kế hoạch", parameters: { type: "object", properties: { steps: { type: "array", items: { type: "string" } } } } } },
            { type: "function", function: { name: "list_dir", description: "Liệt kê file", parameters: { type: "object", properties: { path: { type: "string" } } } } },
            { type: "function", function: { name: "read_file", description: "Đọc file", parameters: { type: "object", properties: { path: { type: "string" } } } } },
            { type: "function", function: { name: "write_file", description: "Ghi file", parameters: { type: "object", properties: { path: { type: "string" }, content: { type: "string" } } } } },
            { type: "function", function: { name: "execute_command", description: "Chạy lệnh", parameters: { type: "object", properties: { command: { type: "string" } } } } }
        ];

        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = `message ${role}-message`;
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text && attachedMedia.length === 0) return;

            let content = text || "Phân tích file đính kèm";
            if (attachedMedia.length > 0) {
                content = [ { type: "text", text: content } ];
                attachedMedia.forEach(m => {
                    if (m.type.startsWith('image/')) content.push({ type: "image_url", image_url: { url: m.data } });
                });
            }

            addMessage('user', text || "Đã gửi Media");
            messageHistory.push({ role: 'user', content: content });
            userInput.value = ''; attachedMedia = []; mediaPreview.innerHTML = '';
            mentionsBox.style.display = 'none';
            
            // Xóa kế hoạch cũ
            planSteps.innerHTML = '<div style="opacity:0.5; padding:20px; text-align:center;">Đang lập kế hoạch...</div>';
            
            await runAgentLoop();
        }

        async function runAgentLoop() {
            const loading = document.createElement('div');
            loading.className = 'message assistant-message';
            loading.innerText = '🔍 Agent đang suy nghĩ...';
            chatBox.appendChild(loading);

            // Chèn System Prompt để bắt Agent phải lập kế hoạch
            const messagesWithSystem = [
                { role: 'system', content: 'Bạn là một Agent thông minh. Trước khi thực hiện các tác vụ phức tạp, bạn PHẢI gọi công cụ update_plan để hiển thị các bước thực hiện cho người dùng.' },
                ...messageHistory
            ];

            while (true) {
                const res = await fetch('/proxy/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model: modelSelect.value, messages: messagesWithSystem, tools: tools_def })
                });
                const data = await res.json();
                const message = data.choices[0].message;
                messageHistory.push(message);

                if (message.tool_calls) {
                    for (const call of message.tool_calls) {
                        const name = call.function.name;
                        const args = JSON.parse(call.function.arguments);
                        loading.innerText = `⚙️ Thực thi: ${name}...`;
                        
                        let result = "";
                        if (name === 'update_plan') {
                            planSteps.innerHTML = args.steps.map(s => `<div class="step active">${s}</div>`).join('');
                            result = "Plan updated.";
                        } else {
                            // Kiểm tra chế độ Auto-Accept
                            const isAuto = document.getElementById('auto-accept').checked;
                            const approved = isAuto || (await askPermission(name, args));
                            
                            if (approved) {
                                const toolRes = await fetch(`/api/${name}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(args) });
                                const toolData = await toolRes.json();
                                result = toolData.result;
                            } else result = "User denied.";
                        }
                        messageHistory.push({ role: 'tool', tool_call_id: call.id, content: result });
                    }
                } else {
                    loading.remove();
                    addMessage('assistant', message.content);
                    break;
                }
            }
        }

        function askPermission(name, args) {
            return new Promise(resolve => {
                const modal = document.getElementById('modal-overlay');
                document.getElementById('modal-desc').innerText = `${name}: ${JSON.stringify(args)}`;
                modal.classList.add('active');
                document.getElementById('btn-allow').onclick = () => { modal.classList.remove('active'); resolve(true); };
                document.getElementById('btn-deny').onclick = () => { modal.classList.remove('active'); resolve(false); };
            });
        }
    </script>
</body>
</html>
