<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NVIDIA DeepSeek Playground</title>
    <style>
        :root {
            --primary: #76b900;
            --bg: #0b0e14;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #e0e0e0;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 300px;
            background: rgba(0, 0, 0, 0.3);
            border-right: 1px solid var(--border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .header {
            padding: 20px 40px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
        }

        .header h1 {
            font-size: 1.2rem;
            margin: 0;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            max-width: 80%;
            padding: 15px 20px;
            border-radius: 12px;
            line-height: 1.5;
            position: relative;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            align-self: flex-end;
            background: var(--primary);
            color: black;
            font-weight: 500;
        }

        .bot-message {
            align-self: flex-start;
            background: var(--card-bg);
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }

        .input-area {
            padding: 30px 40px;
            background: linear-gradient(to top, var(--bg) 80%, transparent);
        }

        .input-wrapper {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 15px;
            display: flex;
            align-items: center;
            padding: 5px 15px;
            transition: border-color 0.3s;
        }

        .input-wrapper:focus-within {
            border-color: var(--primary);
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 15px;
            font-size: 1rem;
            resize: none;
            outline: none;
            height: 24px;
            max-height: 200px;
        }

        .send-btn {
            background: var(--primary);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .send-btn:hover {
            transform: scale(1.05);
        }

        .settings-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.8rem;
            opacity: 0.7;
        }

        select, input {
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: white;
            padding: 10px;
            border-radius: 8px;
            outline: none;
        }

        option, optgroup {
            background-color: #1a1e26;
            color: white;
        }

        pre {
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div style="font-weight: bold; font-size: 1.1rem; margin-bottom: 10px;">Cấu hình NVIDIA</div>
        <div class="settings-item">
            <label>Model</label>
            <select id="model-select">
                <optgroup label="DeepSeek">
                    <option value="deepseek-ai/deepseek-v4-pro">DeepSeek V4 Pro</option>
                    <option value="deepseek-ai/deepseek-v4-flash">DeepSeek V4 Flash</option>
                    <option value="deepseek-ai/deepseek-v3.2">DeepSeek V3.2</option>
                </optgroup>
                <optgroup label="NVIDIA Nemotron">
                    <option value="nvidia/nemotron-3-super-120b-a12b">Nemotron 3 Super 120B</option>
                    <option value="nvidia/nemotron-3-nano-30b-a3b">Nemotron 3 Nano 30B</option>
                    <option value="nvidia/ising-calibration-1-35b-a3b">Ising Calibration 35B</option>
                </optgroup>
                <optgroup label="Google & Meta">
                    <option value="google/gemma-4-31b-it">Gemma 4 31B IT</option>
                    <option value="meta/llama-3.1-405b-instruct">Llama 3.1 405B</option>
                </optgroup>
                <optgroup label="Mistral & Qwen">
                    <option value="mistralai/mistral-small-4-119b-2603">Mistral Small 4</option>
                    <option value="mistralai/devstral-2-123b-instruct-2512">Devstral 2 123B</option>
                    <option value="qwen/qwen3.5-122b-a10b">Qwen 3.5 122B</option>
                    <option value="qwen/qwen3.5-397b-a17b">Qwen 3.5 397B</option>
                </optgroup>
                <optgroup label="Kimi & Others">
                    <option value="moonshotai/kimi-k2.5">Kimi K2.5</option>
                    <option value="moonshotai/kimi-k2-thinking">Kimi K2 Thinking</option>
                    <option value="z-ai/glm-5.1">GLM 5.1</option>
                    <option value="z-ai/glm-4.7">GLM 4.7</option>
                    <option value="minimaxai/minimax-m2.7">MiniMax M2.7</option>
                    <option value="stepfun-ai/step-3.5-flash">Step 3.5 Flash</option>
                </optgroup>
            </select>
        </div>
        <div class="settings-item">
            <label>API Key</label>
            <input type="password" id="api-key" value="nvapi-YOUR_KEY_HERE">
        </div>
        <div style="margin-top: auto; font-size: 0.8rem; opacity: 0.5;">
            Được thiết kế cho Antigravity IDE
        </div>
    </div>

    <div class="main">
        <div class="header">
            <h1><span>🟢</span> NVIDIA NIM Playground</h1>
            <div style="font-size: 0.9rem; opacity: 0.7;">Limit: 40 req/min</div>
        </div>

        <div class="chat-container" id="chat-container">
            <div class="message bot-message">
                Xin chào! Tôi là DeepSeek chạy trên hạ tầng NVIDIA. Tôi có thể giúp gì cho bạn hôm nay?
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="user-input" placeholder="Nhập câu hỏi tại đây... (Shift + Enter để xuống dòng)"></textarea>
                <button class="send-btn" id="send-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
            <div style="text-align: center; font-size: 0.7rem; margin-top: 10px; opacity: 0.5;">
                Nhấn Ctrl + Enter để gửi. Câu trả lời sẽ được agent xử lý nếu trình duyệt bị chặn CORS.
            </div>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const modelSelect = document.getElementById('model-select');
        const apiKeyInput = document.getElementById('api-key');

        function addMessage(text, isUser) {
            const msg = document.createElement('div');
            msg.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
            msg.innerText = text;
            chatContainer.appendChild(msg);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return msg;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            userInput.value = '';
            addMessage(text, true);

            const botMsg = addMessage('Đang suy nghĩ...', false);

            try {
                // Gọi qua local proxy để tránh lỗi CORS
                const response = await fetch('http://localhost:3000/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: modelSelect.value,
                        prompt: text
                    })
                });

                const data = await response.json();
                botMsg.innerText = data.choices[0].message.content;
            } catch (error) {
                botMsg.innerHTML = `<span style="color: #ff4444;">Lỗi: Không thể kết nối với Local Server.</span><br><br>Hãy đảm bảo bạn đã chạy lệnh này trong terminal:<br><code>node c:\\Users\\Admin\\.gemini\\antigravity\\scripts\\nvidia-server.mjs</code>`;
                console.error(error);
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
